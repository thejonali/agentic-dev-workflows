name: Validate workflow specifications

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP workflow server
        run: python -m pip install -e mcp/workflow-server

      - name: Test validation behavior
        run: python -m unittest discover -s tests -v

      - name: Validate canonical specifications
        run: python scripts/validate_workflows.py

      - name: Check generated provider assets
        run: python scripts/generate_provider_assets.py --check
